[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo",
  "php83Extensions.pdo_mysql",
  "php83Extensions.mbstring",
  "php83Extensions.xml",
  "php83Extensions.curl",
  "php83Extensions.zip",
  "php83Extensions.bcmath",
  "php83Extensions.intl",
  "php83Extensions.gd",
  "php83Extensions.tokenizer",
  "php83Extensions.fileinfo",
  "php83Extensions.openssl",
  "php83Extensions.ctype",
  "php83Extensions.session",
  "php83Extensions.dom",
  "composer",
  "nodejs_20",
  "nginx",
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm ci --prefer-offline",
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan optimize",
]

[start]
cmd = "php artisan config:cache && php artisan migrate --force && php artisan storage:link --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
